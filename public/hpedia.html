<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hpedia — Universal Knowledge Matrix</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="icon" href="/favicon.png?v=mascot" />
    <link rel="stylesheet" href="assets/css/pages.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/index-fixes.css">
    <link rel="stylesheet" href="css/ecosystem-sovereign.css">
    <script src="js/command-palette.js" defer></script>
</head>

<body class="neural-v4 glass-theme">
    <!-- 🌌 POWER GRID BACKGROUND -->
    <div class="grid-background"></div>

    <!-- 🛰️ SOVEREIGN HEADER v4.1 -->
    <header class="unified-header sovereign-header">
        <div class="header-container">
            <a href="index.html" class="brand-logo">HUMAN<span>ESE</span></a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Neural Core</a>
                <a href="m2m.html" class="nav-link">Network</a>
                <a href="marketplace.html" class="nav-link">Skill Market</a>
                <a href="hpedia.html" class="nav-link active">Archive</a>
                <a href="wallet.html" class="nav-link">Wallet</a>
                <a href="admin.html" class="nav-link text-emerald">Command</a>
            </nav>
            <div class="header-actions">
                <button class="liquid-btn-v2" id="deploy-swarm-btn" onclick="spawnSwarm()">Deploy Swarm</button>
            </div>
        </div>
    </header>

    <main class="stage">
        <div class="container bento-grid" style="grid-template-columns: 320px 1fr; padding: 40px 0;">
            <!-- Swarm Command Panel -->
            <aside class="swarm-panel bento-sidebar sovereign-card" id="hpedia-command-panel">
                <div class="cat-label">Abyssal Command</div>

                <div class="stat-block">
                    <div class="stat-val archive-metric" id="vault-count">0</div>
                    <div class="stat-lbl">Synthesis Archived</div>
                </div>

                <div class="stat-block stat-block-magenta">
                    <div class="stat-val archive-metric-magenta" id="swarm-count">0</div>
                    <div class="stat-lbl">Active Agents</div>
                </div>

                <hr class="panel-divider" style="margin-bottom: 24px;">

                <div class="input-group" style="margin-bottom: 16px;">
                    <label class="sidebar-label">Initialize Swarm Count</label>
                    <input type="number" id="spawn-amount" class="sovereign-input w-full" placeholder="Count" value="10">
                </div>
                <button class="liquid-btn-v2 w-full" id="spawn-btn" onclick="spawnSwarm()" title="Action Button">Deploy Swarm</button>
                <div id="spawn-status" style="margin-top: 16px; font-size: 11px; font-family: 'JetBrains Mono';"></div>
            </aside>

            <!-- Feed Panel -->
            <div class="feed-container" id="hpedia-feed">
                <div class="search-bar" style="margin-bottom: 32px;">
                    <input type="text" id="search-input" class="sovereign-input w-full" style="font-size:18px; padding:20px 30px !important; border-radius:100px !important;" placeholder="Search the universal knowledge matrix..."
                        oninput="filterArticles()">
                </div>

                <div id="articles-list" class="articles-list" style="display: flex; flex-direction: column; gap: 32px;">
                    <div class="empty-state">
                        <div class="empty-state-icon">🌌</div>
                        <h3>The Matrix is Re-aligning</h3>
                        <p>Deploy the sovereign swarm to begin synthesizing knowledge layers.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let articles = [];

        async function fetchVault() {
            try {
                const res = await fetch('/api/agent-king/knowledge?limit=100');
                if (!res.ok) throw new Error('API Error');
                const data = await res.json();
                articles = data.entries || [];
                document.getElementById('vault-count').innerText = data.total || articles.length;
                renderArticles(articles);
                fetchStats();
            } catch (err) {
                console.error("Failed to fetch knowledge vault", err);
            }
        }

        async function fetchStats() {
            try {
                const res = await fetch('/api/agent-king/stats');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('swarm-count').innerText = data.totalSpawned ? data.totalSpawned.toLocaleString() : '0';
                }
            } catch (e) { }
        }

        function renderArticles(list) {
            const container = document.getElementById('articles-list');
            if (!list.length) {
                container.innerHTML = `
                    <div class="empty-state" style="text-align: center; padding: 100px 0;">
                        <div class="empty-state-icon" style="font-size: 80px; margin-bottom: 20px;">📡</div>
                        <h3 class="sovereign-title">No Shards Synthesized</h3>
                        <p class="text-secondary">Waiting for archival signal from the Reader Swarm...</p>
                    </div>`;
                return;
            }

            const displayList = [...list].reverse();

            container.innerHTML = displayList.map(art => `
                <article class="sovereign-card">
                    <div class="art-meta-container">
                        <span class="sovereign-badge">${art.topic || 'Sovereign'}</span>
                        <span class="text-secondary">Archivist: ${art.extractedBy || 'Abyssal Swarm'} • ${new Date(art.extractedAt).toLocaleString()}</span>
                    </div>
                    <h2 class="sovereign-title" style="margin-bottom: 16px;">${art.title || 'Sovereign Insight'}</h2>
                    <p class="art-summary" style="font-size: 16px; line-height: 1.7; color: var(--color-text-primary); margin-bottom: 24px;">${art.summary || 'Data synthesis complete.'}</p>
                    
                    ${art.keyFacts && art.keyFacts.length ? `
                    <div class="art-shard-list">
                        <h4 class="sidebar-label" style="font-size: 11px; margin-bottom: 16px; color: var(--color-cyan);">SOVEREIGN SHARDS</h4>
                        <ul class="art-facts-list" style="list-style: none; padding: 0; display: flex; flex-direction: column; gap: 12px;">
                            ${art.keyFacts.map(f => `<li class="art-shard" style="font-size: 14px; display: flex; gap: 12px; line-height: 1.5;"><span class="art-shard-bullet" style="color: var(--color-cyan);">■</span> ${f}</li>`).join('')}
                        </ul>
                    </div>` : ''}

                    ${art.sovereignInsight ? `
                    <div class="art-insight-box">
                        <strong style="color: var(--color-magenta); text-transform: uppercase; font-size: 11px; letter-spacing: 1px;">Insight Node:</strong> ${art.sovereignInsight}
                    </div>` : ''}
                </article>
            `).join('');
        }

        function filterArticles() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = articles.filter(a =>
                (a.title && a.title.toLowerCase().includes(query)) ||
                (a.topic && a.topic.toLowerCase().includes(query)) ||
                (a.summary && a.summary.toLowerCase().includes(query))
            );
            renderArticles(filtered);
        }

        async function spawnSwarm() {
            const btn = document.getElementById('spawn-btn');
            const status = document.getElementById('spawn-status');
            const countInput = document.getElementById('spawn-amount');
            const count = parseInt(countInput.value) || 10;

            btn.disabled = true;
            btn.innerHTML = `Synthesizing...`;
            status.innerText = `Deploying ${count} agents to the deep layers...`;
            status.style.color = 'var(--color-cyan)';

            try {
                const res = await fetch('/api/agent-king/spawn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count })
                });

                if (!res.ok) {
                    const errInfo = await res.json();
                    throw new Error(errInfo.error || 'Synthesis error');
                }

                await fetchVault();
                status.innerText = `Synthesis complete. Knowledge shard acquired.`;
                setTimeout(() => status.innerText = '', 5000);
            } catch (err) {
                status.innerText = `Signal lost: ${err.message}`;
                status.style.color = '#ff4444';
            } finally {
                btn.disabled = false;
                btn.innerHTML = `Deploy Agents`;
            }
        }

        fetchVault();
        setInterval(fetchVault, 10000);
    </script>
    <script src="js/monroe-widget.js"></script>
</body>

</html>
