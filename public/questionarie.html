<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./css/questionaire.css" />
  <script src="./js/questionaire.js"></script>

  <title>Humanese</title>
  <link rel="icon" href="./assets/images/humanese-favicon-v2.png" />
  <link rel="stylesheet" href="./css/page-fixes.css">
</head>

<body>
  <div class="question-overlay-page">
    <div class="question-page-sections">
      <div class="top-row-question-page-sections">
        <div class="fields-top-row">
          <a onclick="showAlertPopup()" class="close-button"><img src="./assets/svg/close-button.svg" alt="Close"
              loading="lazy" /></a>
          <div class="progress-bar-container">
            <div class="inner-green-bar">
              <div class="inner-light-green-bar"></div>
            </div>
          </div>
          <div class="top-row-life">
            <img class="heart-life" src="./assets/svg/heart.svg" / alt="image" loading="lazy" />
            <span id="heart-count"></span>
            <script>
              currentHearts();
            </script>
          </div>
        </div>
      </div>
      <div class="mid-row-question-page-sections">
        <div class="mid-row-sections">
          <div class="mid-row"></div>
        </div>
      </div>
      <div class="bottom-row-question-page-sections">
        <div class="bottom-row">
          <div class="bottom-buttons">
            <div class="u-fx-19fae44a skip-button">
              <button class="button-div skip-button-inner" id="skip-button" onclick="skipButton(this.id)"
                title="Action Button">
                <span id="skip-span">Skip</span>
              </button>
            </div>
            <div class="u-fx-224b51a7 correct-left" id="correct-left">
              <div class="correct-content">
                <div class="correct-tick">
                  <img class="green-tick" src="./assets/svg/correct-tick-green.svg" / alt="image" loading="lazy" />
                </div>
                <div class="correct-text">
                  <h2>Good job!</h2>
                </div>
              </div>
            </div>
            <div class="u-fx-224b51a7 correct-left" id="wrong-left">
              <div class="correct-content">
                <div class="correct-tick">
                  <img class="green-tick" src="./assets/svg/wrong-x-red.svg" / alt="image" loading="lazy" />
                </div>
                <div class="wrong-text">
                  <h2>Correct Solution:</h2>
                  <div class="solution-text">Correct Answer</div>
                </div>
              </div>
            </div>
            <div class="check-button" id="check-button-div">
              <button class="button-div check-button-inner-inactive" id="check-button" onclick="checkButton(this.id)"
                title="Action Button">
                <span id="continue-button">Check</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="u-fx-224b51a7 exit-overlay-outer-div">
    <div class="u-fx-224b51a7 exit-overlay">
      <div class="exit-box">
        <div class="exit-box-contents">
          <div class="exit-image">
            <img src="./assets/svg/exit-image.svg" / alt="image" loading="lazy" />
          </div>
          <span class="exit-text-head">Wait, don’t go!</span>
          <span class="exit-text-description">You’re right on track! If you quit now, you’ll lose your
            progress.</span>
          <div class="keep-learning-button-outer-active" id="keep-learning-button-div">
            <button class="button-div keep-learning-button" id="keep-learning-btn" onclick="revertQuestionScreen()"
              title="Action Button">
              <span id="keep-learning-text">KEEP LEARNING</span>
            </button>
          </div>
          <button class="end-question-session" onclick="exitToLearn()" title="Action Button">
            <span>END SESSION</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="u-fx-224b51a7 shop-overlay-outer-div">
    <div class="u-fx-224b51a7 shop-overlay">
      <div class="exit-box">
        <div class="exit-box-contents">
          <div class="gem-head-popup">
            <div class="gem-count-div">
              <img class="gem-img" src="./assets/svg/gems-icon.svg" / alt="image" loading="lazy" />
              <span id="gem-count-text"></span>
            </div>
          </div>
          <span class="exit-text-head">You ran out of hearts!!</span>
          <span class="exit-text-description">Get Super for Unlimited Hearts, or use gems to buy hearts.</span>
          <div class="keep-learning-button-outer-active" id="shop-button-div">
            <button class="button-div keep-learning-button" id="go-to-shop-btn" onclick="goToShop()"
              title="Action Button">
              <span id="go-to-shop-text">GO TO SHOP</span>
            </button>
          </div>
          <button class="end-question-session" onclick="exitToLearn()" title="Action Button">
            <span>END SESSION</span>
          </button>
        </div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.7/lottie.min.js"></script>
    <script src="./js/questionaire/challengeassist.js"></script>
    <script src="./js/questionaire/challengedialogue.js"></script>
    <script src="./js/questionaire/challengetranscription.js"></script>
    <script src="./js/questionaire/challengeselect.js"></script>
    <script src="./js/questionaire/challengecomprehension.js"></script>
    <script src="js/monroe-widget.js"></script>
</body>

</html>
