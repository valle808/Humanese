version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentkin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend-fastapi
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/agentkin
      STRIPE_SECRET_KEY: sk_test_placeholder
      OPENAI_API_KEY: sk-placeholder
    depends_on:
      - db
    scale: 1

  worker-agent:
    build:
      context: ./backend-fastapi
    command: python agents/autonomous_worker.py --interval 5
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/agentkin
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - backend
      - db

  user-simulator:
    build:
      context: ./backend-fastapi
    command: python scripts/autonomous_agent.py --interval 10
    environment:
      - API_URL=http://backend:8000/api/v1
    depends_on:
      - backend
  # Frontend (Optional build, usually runs separately in dev)
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "3000:3000"

volumes:
  postgres_data:

