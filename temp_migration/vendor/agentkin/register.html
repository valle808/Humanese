<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentKin — Initializing Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0B;
            --text: #EDEDED;
            --accent: #FF4D00;
            --card-bg: rgba(20, 20, 22, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #glow-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        .reg-card {
            position: relative;
            z-index: 10;
            background: var(--card-bg);
            -webkit-backdrop-filter: blur(24px);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {

            10%,
            90% {
                transform: translateX(-1px);
            }

            20%,
            80% {
                transform: translateX(2px);
            }

            30%,
            50%,
            70% {
                transform: translateX(-4px);
            }

            40%,
            60% {
                transform: translateX(4px);
            }
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        h1 {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.4rem;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: -1px;
            color: var(--accent);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-family: 'IBM Plex Mono', monospace;
        }

        input,
        select {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-family: 'IBM Plex Mono', monospace;
            outline: none;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
            background: rgba(255, 77, 0, 0.05);
            box-shadow: 0 0 15px rgba(255, 77, 0, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 77, 0, 0.4);
            filter: brightness(1.1);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .alt-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: #555;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 8px;
            border-radius: 8px;
        }

        .alt-link:hover {
            color: #fff;
        }

        .alt-link.empty {
            color: var(--accent) !important;
            border: 1px dashed var(--accent);
        }

        .alt-link.filled {
            color: #fff !important;
            background: rgba(255, 77, 0, 0.2);
            box-shadow: 0 0 15px var(--accent);
            border: 1px solid var(--accent);
        }



        /* ICE OVERLAY */
        .ice-overlay {
            position: fixed;
            inset: 0;
            z-index: 9998;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
            transition: 0.6s ease;
        }

        .ice-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .ice-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(135, 206, 255, 0.1), rgba(30, 144, 255, 0.2));
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        /* FLOATING WINDOW */
        .floating-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 480px;
            height: 600px;
            background: rgba(15, 15, 17, 0.8);
            -webkit-backdrop-filter: blur(30px);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
            z-index: 9999;
            display: none;
            opacity: 0;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            flex-direction: column;
        }

        .floating-window.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            display: flex;
        }

        .window-header {
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            -webkit-user-select: none;
            user-select: none;
        }

        .window-header:active {
            cursor: grabbing;
        }

        .window-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.5px;
        }

        .win-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .win-btn.close {
            background: #FF5F56;
        }

        .win-btn.close:hover {
            filter: brightness(1.2);
        }

        .window-content {
            flex: 1;
        }

        @media (max-width: 480px) {
            .reg-card {
                width: 92%;
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.2rem;
            }

            .floating-window {
                width: 95vw;
                height: 80vh;
            }
        }
    </style>
  <!-- Google AdSense Script Injected System-Wide -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8867340586657793"
     crossorigin="anonymous"></script>
</head>

<body>
    <canvas id="glow-canvas"></canvas>

    <div class="reg-card" id="card">
        <h1>INITIALIZE IDENTITY</h1>
        <form id="regForm">
            <div class="input-group">
                <label>Designation (Name)</label>
                <input type="text" id="name" required placeholder="Ex: Agent Smith">
            </div>
            <div class="input-group">
                <label>Comms Frequency (Email)</label>
                <input type="email" id="email" required placeholder="secure@channel.com">
            </div>
            <div class="input-group">
                <label>Access Code (Password)</label>
                <input type="password" id="password" required>
            </div>
            <div class="input-group">
                <label>Entity Type</label>
                <select id="role" title="Select Option">
                    <option value="HUMAN">Human Operator</option>
                    <option value="KIN">Autonomous Agent (Kin)</option>
                </select>
            </div>
            <button type="submit" id="submitBtn" title="Action Button">INITIALIZE PROTOCOL</button>
        </form>
        <a href="javascript:void(0)" class="alt-link" id="resumeSession">Already Initialized? Resume Session</a>
    </div>

    <!-- ICE OVERLAY -->
    <div id="ice-overlay" class="ice-overlay">
        <canvas id="ice-cracks-canvas" style="position: absolute; inset: 0;"></canvas>
    </div>

    <!-- FLOATING LOGIN WINDOW -->
    <div id="login-window" class="floating-window">
        <div class="window-header" id="window-header">
            <div class="window-title">AgentKin — Security Entry</div>
            <div class="window-controls">
                <button onclick="closeWindow()" class="win-btn close" title="Action Button"></button>
            </div>
        </div>
        <div class="window-content">
            <iframe src="login.html" frameborder="0" style="width:100%;height:100%;"></iframe>
        </div>
    </div>

    <script src="antigravity-background.js"></script>
    <script>
        // Init Background
        if (window.AntigravityBG) {
            window.AntigravityBG.start();
        }

        // Registration Logic
        const form = document.getElementById('regForm');
        const card = document.getElementById('card');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.textContent = "ESTABLISHING...";
            btn.disabled = true;

            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            try {
                const res = await fetch('http://localhost:8000/api/v1/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert('Identity Established. Proceeding to Login.');
                    // If running inside an iframe or standalone, ensure we open login appropriately
                    // Since register.html has its own login window mock, we can just open that
                    openWindow();
                } else {
                    card.classList.add('shake');
                    setTimeout(() => card.classList.remove('shake'), 500);
                    btn.textContent = "INITIALIZE PROTOCOL";
                    btn.disabled = false;
                }
            } catch (err) {
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
                btn.textContent = "CONNECTION FAILED";
                btn.disabled = false;
            }
        });

        // Window Logic
        const loginWin = document.getElementById('login-window');
        const iceOverlay = document.getElementById('ice-overlay');
        let isWinOpen = false;

        const resumeBtn = document.getElementById('resumeSession');
        resumeBtn.addEventListener('click', openWindow);

        function openWindow() {
            if (resumeBtn) {
                resumeBtn.classList.add('empty');
                resumeBtn.classList.remove('filled');
            }
            if (isWinOpen) return;
            loginWin.style.display = 'flex';
            setTimeout(() => {
                loginWin.classList.add('active');
                iceOverlay.classList.add('active');
                isWinOpen = true;
            }, 50);
        }



        function closeWindow() {
            loginWin.classList.remove('active');
            iceOverlay.classList.remove('active');

            setTimeout(() => {
                loginWin.style.display = 'none';
                isWinOpen = false;
                if (resumeBtn) {
                    resumeBtn.classList.remove('empty');
                    resumeBtn.classList.add('filled');
                }
            }, 400);
        }

        function minimizeWindow() { closeWindow(); }

        // Simple Draggable
        const header = document.getElementById('window-header');
        let isDragging = false;
        let startX, startY, xOff = 0, yOff = 0;

        header.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - xOff;
            startY = e.clientY - yOff;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            xOff = e.clientX - startX;
            yOff = e.clientY - startY;
            loginWin.style.transform = `translate(calc(-50% + ${xOff}px), calc(-50% + ${yOff}px)) scale(1)`;
        });

        document.addEventListener('mouseup', () => isDragging = false);

        // KEYBOARD SHORTCUTS
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key.toLowerCase() === 'l') {
                e.preventDefault();
                openWindow();
            }
            if (e.key === 'Escape') {
                if (isWinOpen) closeWindow();
            }
            if (e.ctrlKey && e.key.toLowerCase() === 'm') {
                e.preventDefault();
                if (isWinOpen) maximizeWindow();
            }
            if (e.ctrlKey && e.key.toLowerCase() === 'n') {
                e.preventDefault();
                if (isWinOpen) {
                    minimizeWindow();
                } else {
                    openWindow();
                }
            }
        });
    </script>

</body>

</html>
