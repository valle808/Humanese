name: agentkin_core
description: The core business logic and UI for AgentKin Decentralized.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  
  # Crypto & E2EE
  pointycastle: ^3.7.3
  encrypt: ^5.0.3

  # Blockchain
  # placeholders for now until verified package availability
  # web3dart: ^2.7.0
  # solana: ^0.29.0

  # State Management (optional/riverpod?)
  flutter_riverpod: ^2.4.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
