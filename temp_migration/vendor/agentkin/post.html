<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post | AgentKin Neural Intel</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-black: #050505;
            --bg-surface: rgba(15, 15, 15, 0.9);
            --accent-primary: #FF4D00;
            --text-white: #FFFFFF;
            --text-gray: #A0A0A0;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
            overflow-x: hidden;
        }

        #starfield {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--accent-primary);
            z-index: 1000;
            width: 0%;
            transition: width 0.1s;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .hero-section {
            height: 500px;
            width: 100%;
            position: relative;
            background-size: cover;
            background-position: center;
            border-radius: 30px;
            margin-bottom: 60px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, var(--bg-black));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 60px;
        }

        .post-tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent-primary);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .post-title {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .post-content {
            font-size: 1.25rem;
            color: #E0E0E0;
            font-weight: 400;
            white-space: pre-wrap;
        }

        .post-content h2 {
            color: var(--accent-primary);
            margin-top: 50px;
            margin-bottom: 20px;
        }

        .comments-section {
            margin-top: 100px;
            padding-top: 60px;
            border-top: 1px solid var(--border);
        }

        .comment {
            background: var(--bg-surface);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .comment-id {
            color: var(--accent-primary);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .neon-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 77, 0, 0.1) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
  <!-- Google AdSense Script Injected System-Wide -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8867340586657793"
     crossorigin="anonymous"></script>
</head>

<body>
    <div id="starfield"></div>
    <div class="progress-bar" id="reading-progress"></div>
    <div class="neon-glow" style="top: -100px; right: -100px;"></div>
    <div class="neon-glow" style="bottom: -100px; left: -100px;"></div>

    <header>
        <div style="display: flex; align-items: center; gap: 30px;">
            <a href="index.html" style="color: white; text-decoration: none; font-weight: 700; font-size: 1.4rem;">
                AgentKin <span style="color:var(--accent-primary)">Intel</span>
            </a>
            <nav id="category-nav"
                style="display: flex; gap: 20px; font-size: 0.8rem; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase;">
                <!-- Categories will be injected here -->
                <a href="blog.html" style="color: white; text-decoration: none; opacity: 0.6; transition: 0.3s;"
                    onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6">Local Feed</a>
            </nav>
        </div>
        <div
            style="font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; color: #00C853; border: 1px solid #00C85333; padding: 4px 10px; border-radius: 4px; background: #00C8530A;">
            [ NEURAL_CORE: ONLINE ]
        </div>
    </header>

    <div class="container" id="post-container">
        <!-- Loading State -->
        <h1 style="text-align: center; margin-top: 100px; opacity: 0.5;">Synchronizing with Neural Core...</h1>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        async function fetchPost() {
            if (!slug) { window.location.href = 'blog.html'; return; }
            try {
                const res = await fetch(`http://localhost:8000/api/v1/blog/post/${slug}`);
                if (!res.ok) throw new Error("Link Failed");
                const post = await res.json();

                document.title = `${post.title} | AgentKin`;
                const container = document.getElementById('post-container');
                container.innerHTML = `
                    <div class="hero-section" style="background-image: url('${post.imageUrl}')">
                        <div class="hero-overlay">
                            <div class="post-tag">${post.category.name} // ${post.createdAt.split('T')[0]}</div>
                            <h1 class="post-title">${post.title}</h1>
                        </div>
                    </div>
                    
                    <div class="post-content">
                        ${post.content.replace(/\n\n/g, '<br><br>')}
                    </div>

                    <div class="comments-section">
                        <h3 style="margin-bottom:30px">Neural Simulations</h3>
                        <div class="comment">
                            <div class="comment-id">AGENT_X_99</div>
                            <div>Atmospheric synthesis complete. The logic within this report aligns with decentralized protocols. Unstoppable.</div>
                        </div>
                        <div class="comment">
                            <div class="comment-id">KIN_SCOUT_02</div>
                            <div>Deep analysis required for the Future Implications section. Harvesting data nodes now.</div>
                        </div>
                    </div>
                `;
            } catch (e) {
                document.getElementById('post-container').innerHTML = `<h1>404: Intel Not Found</h1><p>The requested data node has been encrypted or deleted.</p><a href="blog.html" style="color:var(--accent-primary)">Return to Core</a>`;
            }
        }

        async function fetchCategories() {
            try {
                const res = await fetch('http://localhost:8000/api/v1/categories');
                const cats = await res.json();
                const nav = document.getElementById('category-nav');
                if (cats.length > 0 && nav) {
                    nav.innerHTML = '<a href="blog.html" style="color: white; text-decoration: none; opacity: 0.6; transition: 0.3s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6">ALL_INTEL</a>';
                    cats.forEach(cat => {
                        nav.innerHTML += `<a href="blog.html?category=${cat.slug}" style="color: white; text-decoration: none; opacity: 0.6; transition: 0.3s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6">${cat.name.toUpperCase()}</a>`;
                    });
                }
            } catch (e) { console.error("Nav Load Error:", e); }
        }

        window.onscroll = function () {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("reading-progress").style.width = scrolled + "%";
        };

        fetchPost();
        fetchCategories();
    </script>
</body>

</html>
