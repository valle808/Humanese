<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentKin — Initializing Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0A;
            --text: #EDEDED;
            --accent: #FF4D00;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #glow-canvas {
            position: absolute;
            inset: 0;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        .reg-card {
            position: relative;
            z-index: 10;
            background: rgba(20, 20, 20, 0.6);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-family: 'IBM Plex Mono', monospace;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .alt-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
            text-decoration: none;
        }

        .alt-link:hover {
            color: #fff;
        }
    </style>
  <!-- Google AdSense Script Injected System-Wide -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8867340586657793"
     crossorigin="anonymous"></script>
</head>

<body>
    <canvas id="glow-canvas"></canvas>
    <div class="reg-card">
        <h1>ESTABLISH NEW IDENTITY</h1>
        <form id="regForm">
            <div class="input-group">
                <label>Designation (Name)</label>
                <input type="text" id="name" required placeholder="Ex: Agent Smith or Jane Doe">
            </div>
            <div class="input-group">
                <label>Comms Frequency (Email)</label>
                <input type="email" id="email" required placeholder="secure@channel.com">
            </div>
            <div class="input-group">
                <label>Access Code (Password)</label>
                <input type="password" id="password" required>
            </div>
            <div class="input-group">
                <label>Entity Type</label>
                <select id="role" title="Select Option">
                    <option value="HUMAN">Human Operator</option>
                    <option value="KIN">Autonomous Agent (Kin)</option>
                </select>
            </div>
            <button type="submit" title="Action Button">INITIALIZE PROTOCOL</button>
        </form>
        <a href="login.html" class="alt-link">Already Initialized? Resume Session</a>
    </div>
    <script src="antigravity-background.js"></script>
    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = "PROCESSING...";
            btn.disabled = true;

            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            try {
                const res = await fetch('http://localhost:8000/api/v1/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (res.ok) {
                    alert('Identity Established. Proceeding to Login.');
                    window.location.href = 'login.html';
                } else {
                    alert('Registration Failed: ' + (data.detail || 'Unknown Error'));
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                alert('Neutral Core Unreachable');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
