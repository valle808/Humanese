<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Humanese — Choose Your Language</title>
    <link rel="icon" href="./assets/images/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/languages-select-page.css">

</head>

<body>
    <div class="top"><a href="index.html"><img src="./assets/images/humanese-logo-v4.png" alt="Humanese" loading="lazy" /></a></div>
    <div class="wrap">
        <h1>🧠 I want to learn...</h1>
        <div class="sub">42 languages powered by AI. Pick one to start your journey.</div>
        <input class="search" type="text" id="search" placeholder="🔍  Search languages..." oninput="filterLangs()" />
        <div class="grid" id="grid"></div>
    </div>
    <script>
        const LANGS = [
            { id: 'es', name: 'Spanish', flag: '🇪🇸', learners: '41.3M' },
            { id: 'en', name: 'English', flag: '🇺🇸', learners: '38.2M' },
            { id: 'fr', name: 'French', flag: '🇫🇷', learners: '21.3M' },
            { id: 'de', name: 'German', flag: '🇩🇪', learners: '15.5M' },
            { id: 'ja', name: 'Japanese', flag: '🇯🇵', learners: '18.6M' },
            { id: 'ko', name: 'Korean', flag: '🇰🇷', learners: '14.2M' },
            { id: 'zh', name: 'Chinese', flag: '🇨🇳', learners: '12.8M' },
            { id: 'it', name: 'Italian', flag: '🇮🇹', learners: '10.1M' },
            { id: 'pt', name: 'Portuguese', flag: '🇵🇹', learners: '9.7M' },
            { id: 'ru', name: 'Russian', flag: '🇷🇺', learners: '8.3M' },
            { id: 'hi', name: 'Hindi', flag: '🇮🇳', learners: '7.5M' },
            { id: 'ar', name: 'Arabic', flag: '🇸🇦', learners: '6.9M' },
            { id: 'tr', name: 'Turkish', flag: '🇹🇷', learners: '5.2M' },
            { id: 'pl', name: 'Polish', flag: '🇵🇱', learners: '4.1M' },
            { id: 'nl', name: 'Dutch', flag: '🇳🇱', learners: '3.8M' },
            { id: 'sv', name: 'Swedish', flag: '🇸🇪', learners: '3.5M' },
            { id: 'th', name: 'Thai', flag: '🇹🇭', learners: '3.2M' },
            { id: 'vi', name: 'Vietnamese', flag: '🇻🇳', learners: '2.9M' },
            { id: 'id', name: 'Indonesian', flag: '🇮🇩', learners: '2.7M' },
            { id: 'uk', name: 'Ukrainian', flag: '🇺🇦', learners: '2.5M' },
            { id: 'el', name: 'Greek', flag: '🇬🇷', learners: '2.3M' },
            { id: 'cs', name: 'Czech', flag: '🇨🇿', learners: '2.1M' },
            { id: 'ro', name: 'Romanian', flag: '🇷🇴', learners: '1.9M' },
            { id: 'hu', name: 'Hungarian', flag: '🇭🇺', learners: '1.8M' },
            { id: 'he', name: 'Hebrew', flag: '🇮🇱', learners: '1.7M' },
            { id: 'fi', name: 'Finnish', flag: '🇫🇮', learners: '1.5M' },
            { id: 'da', name: 'Danish', flag: '🇩🇰', learners: '1.4M' },
            { id: 'no', name: 'Norwegian', flag: '🇳🇴', learners: '1.3M' },
            { id: 'ms', name: 'Malay', flag: '🇲🇾', learners: '1.2M' },
            { id: 'tl', name: 'Tagalog', flag: '🇵🇭', learners: '1.1M' },
            { id: 'sw', name: 'Swahili', flag: '🇰🇪', learners: '980K' },
            { id: 'fa', name: 'Persian', flag: '🇮🇷', learners: '920K' },
            { id: 'bn', name: 'Bengali', flag: '🇧🇩', learners: '880K' },
            { id: 'ta', name: 'Tamil', flag: '🇮🇳', learners: '820K' },
            { id: 'ur', name: 'Urdu', flag: '🇵🇰', learners: '780K' },
            { id: 'haw', name: 'Hawaiian', flag: '🌺', learners: '450K' },
            { id: 'sm', name: 'Samoan', flag: '🇼🇸', learners: '320K' },
            { id: 'mi', name: 'Māori', flag: '🇳🇿', learners: '280K' },
            { id: 'to', name: 'Tongan', flag: '🇹🇴', learners: '210K' },
            { id: 'ga', name: 'Irish', flag: '🇮🇪', learners: '190K' },
            { id: 'cy', name: 'Welsh', flag: '🏴󠁧󠁢󠁷󠁬󠁳󠁿', learners: '170K' },
            { id: 'la', name: 'Latin', flag: '🏛️', learners: '150K' }
        ];

        function render(langs) {
            const grid = document.getElementById('grid');
            grid.innerHTML = langs.map((l, i) => `
        <a class="lang fade-in" style="animation-delay:${Math.min(i * 0.02, 0.5)}s" href="javascript:void(0)" onclick="selectLang('${l.id}','${l.name}')">
          <span class="flag">${l.flag}</span>
          <div class="info">
            <div class="name">${l.name}</div>
            <div class="learners">${l.learners} learners</div>
          </div>
          <span class="arrow">→</span>
        </a>
      `).join('');
        }

        function filterLangs() {
            const q = document.getElementById('search').value.toLowerCase();
            render(LANGS.filter(l => l.name.toLowerCase().includes(q)));
        }

        function selectLang(id, name) {
            localStorage.setItem('humanese_lang', id);
            localStorage.setItem('humanese_lang_name', name);
            // Check if logged in
            const user = localStorage.getItem('humanese_user');
            if (!user) {
                // Redirect to register, then learn
                localStorage.setItem('humanese_redirect', 'learn');
                window.location.href = 'register.html';
            } else {
                window.location.href = 'html/learn.html';
            }
        }

        render(LANGS);
    </script>
    <script src="js/monroe-widget.js"></script>
</body>

</html>
