name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build public directory
        run: |
          mkdir -p public
          # Copy all static HTML pages
          cp *.html public/ 2>/dev/null || true
          # Copy all assets (CSS, JS, images)
          cp -r assets public/ 2>/dev/null || true
          cp -r css public/ 2>/dev/null || true
          cp -r js public/ 2>/dev/null || true
          cp -r data public/ 2>/dev/null || true
          # Copy manifest and static files
          cp favicon.png public/ 2>/dev/null || true
          cp ads.txt public/ 2>/dev/null || true
          echo "✅ Public directory built successfully"
          ls -la public/

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HUMANESE_DB }}
          projectId: humanese-db
          channelId: live
